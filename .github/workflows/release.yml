name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify version coherence
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PYPROJECT=$(grep -E '^version = ' pyproject.toml | awk -F'"' '{print $2}')
          MANIFEST=$(python -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          if [ "$TAG" != "$PYPROJECT" ] || [ "$TAG" != "$MANIFEST" ]; then
            echo "Version mismatch: tag=$TAG pyproject=$PYPROJECT manifest=$MANIFEST"
            exit 1
          fi
          echo "Version coherent: $TAG"

      - name: Extract changelog section
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          awk "/^## \[$TAG\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
