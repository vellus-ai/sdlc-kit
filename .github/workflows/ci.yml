name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev,yaml]"
      - run: ruff check core/ skills/ hooks/ tests/ scripts/

  test:
    name: Tests (${{ matrix.os }} / py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: "pip"
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install package + dev deps
        run: pip install -e ".[dev,yaml]"
      - name: Run tests
        run: pytest --tb=short -q -p no:randomly

  coverage:
    name: Coverage gate (combined)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev,yaml]"
      # Captures line coverage of core/ AND of skill scripts invoked via
      # subprocess.run() thanks to tests/sitecustomize.py + coverage.process_startup()
      # (see pyproject.toml `[tool.coverage.run] parallel = true`).
      - name: Run tests
        run: pytest -q -p no:randomly
      - name: Combine coverage data
        run: python -m coverage combine
      - name: Coverage report (gate ≥ 80%)
        run: python -m coverage report --fail-under=80

  registry-audit:
    name: Template ↔ Registry audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python scripts/audit_registry.py
