name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev,yaml]"
      - run: ruff check core/ skills/ hooks/ tests/ scripts/

  test:
    name: Tests (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: "pip"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev,yaml]"
      - run: pytest --tb=short -q

  coverage:
    name: Coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev,yaml]"
      # Coverage for in-process modules (core/). Skill scripts are invoked via
      # subprocess so their line coverage is not captured by this gate; their
      # behavior is still fully tested via JSON contract assertions in the
      # test_*_skill.py suite.
      - run: pytest --cov=core --cov-branch --cov-report=term-missing --cov-fail-under=75

  registry-audit:
    name: Template ↔ Registry audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python scripts/audit_registry.py
